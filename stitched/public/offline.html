<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stitched — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #FAF6F1;
      color: #5C4A3A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .offline-container { max-width: 360px; }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: #C75B39;
      margin-bottom: 1rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { font-size: 0.95rem; line-height: 1.6; opacity: 0.7; margin-bottom: 2rem; }
    button {
      background: #C75B39;
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="logo">Stitched</div>
    <div class="icon">🧵</div>
    <h1>You're Offline</h1>
    <p>It seems you've lost your connection. Please check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
